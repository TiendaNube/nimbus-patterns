name: publish-rc-manual

on:
  workflow_dispatch:
    inputs:
      packages:
        description: |
          Comma-separated list of packages to publish (e.g., @nimbus-ds/patterns,@nimbus-ds/patterns-webpack).
          Available packages: @nimbus-ds/patterns, @nimbus-ds/patterns-webpack
        required: true
        type: string
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: publish-rc-packages
  cancel-in-progress: false

jobs:
  publish-rc-packages:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-deps

      - name: Build components
        run: |
          export NODE_OPTIONS="--max_old_space_size=8192"
          yarn build:components

      - name: Publish RC packages
        run: |
          IFS=',' read -ra PACKAGES <<< "${{ github.event.inputs.packages }}"
          FAILED=0
          FAILED_PACKAGES=""
          for package in "${PACKAGES[@]}"; do
            package=$(echo "$package" | xargs)
            if [ -n "$package" ]; then
              echo "📦 Publishing RC for $package with bump type: ${{ github.event.inputs.bump_type }}"
              set +e
              echo "y" | yarn publish:rc "$package" "${{ github.event.inputs.bump_type }}"
              EXIT_CODE=$?
              set -e
              if [ $EXIT_CODE -ne 0 ]; then
                echo "❌ Failed to publish $package (exit code: $EXIT_CODE)"
                FAILED=$((FAILED + 1))
                FAILED_PACKAGES="${FAILED_PACKAGES}${FAILED_PACKAGES:+, }$package"
              fi
            fi
          done
          if [ $FAILED -gt 0 ]; then
            echo ""
            echo "=========================================="
            echo "❌ PUBLISH SUMMARY: $FAILED package(s) failed"
            echo "Failed packages: $FAILED_PACKAGES"
            echo "=========================================="
            exit 1
          fi
          echo "✅ All packages published successfully"
        env:
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTOMATION_FROM_JUNIOR_CONQUISTA }}
