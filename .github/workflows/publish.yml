name: "publish-release"

on:
  push:
    branches:
      - master
    paths-ignore:
      - "**/package.json"
      - ".yarn/versions/**"
      - "**/*.docs.json"

jobs:
  publish-packages-npm:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Node version
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "yarn"
          registry-url: 'https://registry.npmjs.org/'
          auth-oidc: true

      - name: Cache NPM dependencies
        uses: actions/cache@v3
        id: cache-dependencies
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/yarn.lock') }}

      - name: Install dependencies
        if: steps.cache-dependencies.outputs.cache-hit != 'true'
        run: yarn

      - name: Publish
        run: |
          export NODE_OPTIONS="--max_old_space_size=8192"
          if [ -f ".yarnrc.yml" ]; then
            yarn config set npmAuthIdent ""
            yarn config set npmAlwaysAuth false
          fi
          yarn publish:stable
        env:
          NODE_AUTH_TOKEN: ""

      - name: Create release PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: publish release [skip ci]"
          title: "feat: publish release"
          body: |
            Automated publish release — updates package versions and docs.
          add-paths: |
            packages/**/package.json
            **/*.docs.json
            .yarn/versions/**
          branch: release/publish-${{ github.run_id }}
          base: master
          delete-branch: true
